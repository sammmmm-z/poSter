<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - poSter</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #62a8a8;
            --primary-hover: #81c9c9;
            --shadow-color: rgba(98, 168, 168, 0.3);
            --background-color: #f4f7fc;
            --background-light: white;
            --text-color: #333;
        }
        body {
            background: linear-gradient(135deg, var(--background-color) 0%, #e8f0f5 100%);
            font-family: 'Open Sans', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
        }
        header {
            background: var(--background-light);
            padding: 15px 30px;
            box-shadow: 0 2px 10px rgba(98, 168, 168, 0.1);
            border-radius: 12px;
            margin-bottom: 40px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--primary-color);
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }
        .header-nav { display: flex; gap: 30px; align-items: center; }
        .header-nav a {
            text-decoration: none;
            color: #666;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .header-nav a:hover { color: var(--primary-color); }
        .header-nav a.active { color: var(--primary-color); }
        #logoutBtn {
            background-color: #f0f0f0;
            color: var(--text-color);
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.3s, color 0.3s;
            font-family: 'Open Sans', sans-serif;
        }
        #logoutBtn:hover {
            background-color: #dc3545;
            color: white;
        }
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            gap: 30px;
        }
        .sidebar {
            background: var(--background-light);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 2px 10px var(--shadow-color);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        .sidebar-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--text-color);
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin-bottom: 12px; }
        .sidebar-menu a {
            display: block;
            padding: 12px 15px;
            text-decoration: none;
            color: #666;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s;
            font-weight: 500;
        }
        .sidebar-menu a:hover, .sidebar-menu a.active {
            background-color: var(--primary-color);
            color: white;
        }
        .right-sidebar {
            background: var(--background-light);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 2px 10px var(--shadow-color);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        .right-sidebar-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--text-color);
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }
        .suggested-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .suggested-user:last-child { border-bottom: none; }
        .suggested-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
            overflow: hidden;
        }
        .suggested-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .suggested-info { flex-grow: 1; }
        .suggested-name { font-size: 14px; font-weight: 700; color: var(--text-color); display: block; }
        .suggested-handle { font-size: 12px; color: #888; }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Open Sans', sans-serif;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-unfollow {
            background-color: #f0f0f0;
            color: #dc3545;
            border: 1px solid #dc3545;
            padding: 6px 15px;
        }
        .btn-unfollow:hover { background-color: #dc3545; color: white; }
        .profile-action-container { display: flex; gap: 10px; margin-left: auto; z-index: 1; }
        .profile-follow-btn {
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .profile-follow-btn.following {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
        }
        .profile-follow-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
        #profileMainContent {
            background: var(--background-light);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(98, 168, 168, 0.15);
        }
        .profile-header-area {
            background: linear-gradient(135deg, #62a8a8 0%, #81c9c9 100%);
            padding: 40px 30px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .profile-header-area::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.07);
        }
        .profile-info {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-start;
            gap: 28px;
            margin-bottom: 10px;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-weight: 800;
            font-size: 48px;
            flex-shrink: 0;
            border: 6px solid white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-details { flex-grow: 1; padding-top: 8px; }
        .profile-name {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 6px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .profile-handle { font-size: 18px; opacity: 0.95; margin-bottom: 16px; }
        .profile-detail-item { font-size: 15px; margin-bottom: 8px; opacity: 0.95; }
        .profile-bio {
            font-size: 16px;
            line-height: 1.7;
            margin-top: 18px;
            max-width: 600px;
            opacity: 0.98;
            background: rgba(255,255,255,0.15);
            padding: 12px 18px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }
        .edit-profile-btn {
            background: rgba(255,255,255,0.25);
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .edit-profile-btn:hover {
            background: white;
            color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .profile-stats {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 40px;
            margin-top: 30px;
            background: rgba(255,255,255,0.15);
            padding: 18px 25px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        .stat-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            padding: 8px 12px;
            border-radius: 12px;
        }
        .stat-item:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-4px);
        }
        .stat-count { font-weight: 800; font-size: 28px; display: block; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .stat-label { font-size: 15px; opacity: 0.9; margin-top: 4px; }
        .post-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: none;
        }
        .tab-btn {
            flex: 1;
            padding: 18px 10px;
            background: none;
            border: none;
            font-size: 17px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .tab-btn:hover { background-color: #eef2f7; }
        .tab-btn.active { color: var(--primary-color); }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: var(--primary-color);
            border-radius: 2px;
        }
        .profile-content { padding: 30px; background: var(--background-light); }
        .post {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #f0f0f0;
            animation: slideInUp 0.3s ease-out;
            position: relative;
        }
        .post:last-child { border-bottom: none; margin-bottom: 0; }
        .post-header {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-author-info { flex-grow: 1; }
        .post-author-name { font-weight: 700; font-size: 15px; color: var(--text-color); display: block; }
        .post-author-handle { font-size: 13px; color: #888; display: block; }
        .post-time { font-size: 13px; color: #888; }
        .post-content { margin-bottom: 15px; line-height: 1.6; color: #555; }
        .post-media {
            width: 100%;
            max-height: 400px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 15px;
        }
        .post-actions {
            display: flex;
            gap: 20px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
            justify-content: space-around;
            margin: 0 -30px -30px -30px;
            padding: 15px 30px;
            background: #fafafa;
            border-radius: 0 0 16px 16px;
        }
        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            transition: color 0.3s;
            padding: 8px 12px;
            border-radius: 8px;
        }
        .action-btn:hover { color: var(--primary-color); background: rgba(98,168,168,0.1); }
        .action-btn.liked { color: #e74c3c; }
        .post-control-btns { display: flex; gap: 4px; margin-left: auto; }
        .post-control-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.3s;
            opacity: 0.6;
        }
        .post-control-btn:hover { background: #f0f0f0; opacity: 1; }
        .post-control-btn.delete:hover { background: #ffe6e6; color: #dc3545; }
        .post-control-btn.edit:hover { background: #e6f0ff; color: var(--primary-color); }
        .loading { text-align: center; padding: 40px 25px; color: var(--primary-color); }
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 25px; color: #888; }
        .modal-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 2000;
            overflow-y: auto;
        }
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: var(--background-light);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-height: 90vh;
        }
        .modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text-color); }
        .close-btn { background: none; border: none; font-size: 28px; color: #999; cursor: pointer; }
        .modal-body { padding: 20px 25px; max-height: 400px; overflow-y: auto; }
        .list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .list-item:hover { background-color: #f9f9f9; }
        .list-item:last-child { border-bottom: none; }
        .list-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
            overflow: hidden;
        }
        .list-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .list-info { flex-grow: 1; }
        #editPostModalWrapper .modal { max-width: 520px; }
        #editPostModalWrapper textarea {
            width: 100%;
            min-height: 120px;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Open Sans', sans-serif;
            font-size: 15px;
            resize: vertical;
            transition: border 0.3s;
        }
        #editPostModalWrapper textarea:focus { outline: none; border-color: var(--primary-color); }
        #editPostModalWrapper .save-edit-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-family: 'Open Sans', sans-serif;
        }
        #editPostModalWrapper .save-edit-btn:hover { background-color: var(--primary-hover); }
        #editProfileModalWrapper .modal { max-width: 520px; border-radius: 20px; overflow: visible; }
        #editProfileModalWrapper .modal-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
            color: white;
            padding: 24px 30px;
            border-bottom: none;
            border-radius: 20px 20px 0 0;
        }
        #editProfileModalWrapper .modal-title { font-size: 22px; color: white; display: flex; align-items: center; gap: 8px; }
        #editProfileModalWrapper .close-btn { color: white; opacity: 0.8; transition: opacity 0.3s; }
        #editProfileModalWrapper .close-btn:hover { opacity: 1; }
        #editProfileModalWrapper .modal-body {
            padding: 30px;
            background: #fafcfc;
            border-radius: 0 0 20px 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        #editProfileModalWrapper .edit-avatar-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
        }
        #editProfileModalWrapper .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #eee;
            border: 3px solid white;
            box-shadow: 0 4px 15px rgba(98, 168, 168, 0.2);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 32px;
            flex-shrink: 0;
        }
        #editProfileModalWrapper .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
        #editProfileModalWrapper .avatar-input-wrapper input[type="file"] { display: none; }
        #editProfileModalWrapper .upload-btn-custom {
            display: inline-block;
            padding: 8px 18px;
            background-color: #e8f0f5;
            color: var(--primary-color);
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
            margin-top: 5px;
        }
        #editProfileModalWrapper .upload-btn-custom:hover {
            background-color: white;
            border-color: var(--primary-color);
            box-shadow: 0 2px 8px rgba(98, 168, 168, 0.15);
        }
        #editProfileModalWrapper .edit-label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 14px; }
        #editProfileModalWrapper .edit-input, #editProfileModalWrapper .edit-textarea {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 22px;
            border: 2px solid #eef2f5;
            border-radius: 12px;
            font-family: 'Open Sans', sans-serif;
            font-size: 15px;
            background: white;
            transition: all 0.3s;
            color: var(--text-color);
        }
        #editProfileModalWrapper .edit-input:focus, #editProfileModalWrapper .edit-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(98, 168, 168, 0.1);
        }
        #editProfileModalWrapper .edit-textarea { height: 110px; resize: vertical; }
        #editProfileModalWrapper .edit-form-row { display: flex; gap: 15px; }
        #editProfileModalWrapper .edit-form-col { flex: 1; }
        #editProfileModalWrapper .save-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(98, 168, 168, 0.3);
        }
        #editProfileModalWrapper .save-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(98, 168, 168, 0.4);
        }
        #editProfileModalWrapper .danger-zone {
            margin-top: 35px;
            padding: 20px;
            border: 2px dashed #ffe6e6;
            border-radius: 12px;
            background: #fffafa;
            text-align: center;
        }
        #editProfileModalWrapper .danger-zone-title { color: #dc3545; font-size: 14px; font-weight: 700; margin-bottom: 15px; display: block; }
        #editProfileModalWrapper .btn-danger {
            width: 100%;
            padding: 12px;
            background-color: white;
            color: #dc3545;
            border: 1px solid #dc3545;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        #editProfileModalWrapper .btn-danger:hover { background-color: #dc3545; color: white; transform: translateY(-2px); }
        @media (max-width: 480px) { #editProfileModalWrapper .edit-form-row { flex-direction: column; gap: 0; } }
        @media (max-width: 1024px) { .main-container { grid-template-columns: 1fr 300px; } .sidebar { display: none; } }
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; }
            .main-container { grid-template-columns: 1fr; }
            .right-sidebar { display: none; }
            .profile-header-area { padding: 30px 20px; }
            .profile-info { flex-direction: column; text-align: center; }
            .profile-avatar { margin: 0 auto; }
            .profile-name { font-size: 32px; }
            .profile-action-container { margin: 20px auto 0; justify-content: center; width: 100%; }
            .profile-stats { gap: 20px; justify-content: center; }
        }
        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary-color);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            animation: slideInRight 0.3s ease-out;
            z-index: 3000;
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <header>
        <a href="poSter_home.html" class="header-logo">poSter</a>
        <nav class="header-nav">
            <a href="poSter_home.html">Home</a>
            <a href="poSter_friends.html">Friends</a>
            <a href="poSter_messages.html">Messages</a>
            <a href="#notifications">Notifications</a>
        </nav>
        <button class="btn" id="logoutBtn">Logout</button>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-title">Menu</div>
            <ul class="sidebar-menu">
                <li><a href="poSter_home.html">📰 Home</a></li>
                <li><a href="poSter_friends.html">👥 Friends</a></li>
                <li><a href="poSter_messages.html">💬 Messages</a></li>
                <li><a href="poSter_profile.html" id="myProfileLink" class="active">👤 Profile</a></li>
            </ul>
        </aside>

        <div id="profileMainContent">
            <div class="profile-header-area">
                <div class="profile-info">
                    <div class="profile-avatar" id="profileAvatar"></div>
                    <div class="profile-details">
                        <div class="profile-name" id="profileName"></div>

                        <div class="profile-detail-item" id="profileHobbies"></div>

                    <div class="profile-action-container">
                        <button class="edit-profile-btn" id="editProfileBtn"><span>✏️</span> Edit Profile</button>
                        <button class="profile-follow-btn" id="profileFollowBtn" style="display: none;">Follow</button>

                <div class="profile-stats">
                    <div class="stat-item" id="postsItem">

                    <div class="stat-item" id="followersItem">
                        <span class="stat-count" id="followersCount">0</span>
                        <span class="stat-label">Followers</span>
                    </div>
                    <div class="stat-item" id="followingItem">

                        <span class="stat-label">Following</span>
                    </div>

            <div class="post-tabs">
                <button class="tab-btn active" data-tab="posts">Posts</button>
                <button class="tab-btn" data-tab="likes">Likes</button>

                <div class="loading"><div class="spinner"></div><p>Loading profile...</p></div>

            <div class="right-sidebar-title">Suggested Users</div>
            <div id="suggestedUsersContainer"><div class="loading"><div class="spinner"></div></div></div>

    <!-- Edit Post Modal -->

        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">✏️ Edit Post</h3>

            <div class="modal-body">
                <textarea id="editPostContent" placeholder="Edit your post..."></textarea>
                <button class="save-edit-btn" id="saveEditPostBtn">💾 Save Changes</button>

    <!-- Edit Profile Modal -->
    <div class="modal-wrapper" id="editProfileModalWrapper">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">✨ Edit Profile</h3>
                <button class="close-btn" id="closeEditProfileBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="editProfileForm">
                    <div class="edit-avatar-container">
                        <div class="avatar-preview" id="editAvatarPreview"><span>👤</span></div>
                        <div class="avatar-input-wrapper">
                            <h4 style="margin-bottom: 4px; color: var(--text-color); font-size: 15px;">Profile Photo</h4>
                            <p style="font-size: 12px; color: #888; margin-bottom: 12px;">Square images look best.</p>
                            <label for="editAvatarInput" class="upload-btn-custom">📸 Choose Photo</label>
                            <input type="file" id="editAvatarInput" accept="image/*">
                        </div>
                    </div>
                    <label for="editName" class="edit-label">Name</label>
                    <input type="text" id="editName" class="edit-input" placeholder="Your display name">
                    <label for="editBio" class="edit-label">Bio</label>
                    <textarea id="editBio" class="edit-textarea" placeholder="Tell us a little about yourself..."></textarea>
                    <div class="edit-form-row">
                        <div class="edit-form-col">
                            <label for="editBirthday" class="edit-label">Birthday</label>
                            <input type="date" id="editBirthday" class="edit-input">
                        </div>
                        <div class="edit-form-col">
                            <label for="editHobbies" class="edit-label">Hobbies</label>
                            <input type="text" id="editHobbies" class="edit-input" placeholder="e.g. Reading, Music">
                        </div>
                    </div>
                    <button type="submit" class="save-btn">Save Changes</button>
                    <div class="danger-zone">
                        <span class="danger-zone-title">Danger Zone</span>
                        <button type="button" class="btn-danger" id="deleteAccountBtn">⚠️ Delete Account</button>
                    </div>

            </div>

    <!-- User List Modal -->
    <div class="modal-wrapper" id="userListModalWrapper">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="listModalTitle">User List</h3>
                <button class="close-btn" id="closeListBtn">&times;</button>
            </div>
            <div class="modal-body" id="listModalBody"></div>
        </div>
    </div>

    <!-- Comments Modal -->
    <div class="modal-wrapper" id="commentsModalWrapper">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Comments</h3>
                <button class="close-btn" id="closeCommentsBtn">&times;</button>
            </div>
            <div class="modal-body" id="commentsModalBody"></div>
        </div>
    </div>

    <script>
        const currentUser = localStorage.getItem('currentUser');
        const urlParams = new URLSearchParams(window.location.search);
        const viewedUsername = urlParams.get('username');
        const targetUser = viewedUsername || currentUser;
        const isOwnProfile = !viewedUsername || viewedUsername === currentUser;

        let userProfile = {};
        let allPosts = [];
        let userPosts = [];
        let userLikedPosts = [];
        let currentTab = 'posts';
        let currentListType = '';
        let amIFollowingTarget = false;
        let editingPostId = null;

        // DOM Elements
        const profileAvatar = document.getElementById('profileAvatar');
        const profileName = document.getElementById('profileName');
        const profileHandle = document.getElementById('profileHandle');
        const profileBio = document.getElementById('profileBio');
        const profileBirthday = document.getElementById('profileBirthday');
        const profileHobbies = document.getElementById('profileHobbies');
        const postsCount = document.getElementById('postsCount');
        const followersCount = document.getElementById('followersCount');
        const followingCount = document.getElementById('followingCount');
        const profileContent = document.getElementById('profileContent');
        const suggestedUsersContainer = document.getElementById('suggestedUsersContainer');
        const myProfileLink = document.getElementById('myProfileLink');
        const editProfileBtn = document.getElementById('editProfileBtn');
        const profileFollowBtn = document.getElementById('profileFollowBtn');
        const editProfileModalWrapper = document.getElementById('editProfileModalWrapper');
        const closeEditProfileBtn = document.getElementById('closeEditProfileBtn');
        const editProfileForm = document.getElementById('editProfileForm');
        const userListModalWrapper = document.getElementById('userListModalWrapper');
        const listModalTitle = document.getElementById('listModalTitle');
        const listModalBody = document.getElementById('listModalBody');
        const closeListBtn = document.getElementById('closeListBtn');
        const followersItem = document.getElementById('followersItem');
        const followingItem = document.getElementById('followingItem');
        const commentsModalWrapper = document.getElementById('commentsModalWrapper');
        const closeCommentsBtn = document.getElementById('closeCommentsBtn');
        const commentsModalBody = document.getElementById('commentsModalBody');
        const logoutBtn = document.getElementById('logoutBtn');
        const editAvatarInput = document.getElementById('editAvatarInput');
        const editAvatarPreview = document.getElementById('editAvatarPreview');
        const deleteAccountBtn = document.getElementById('deleteAccountBtn');
        const editPostModalWrapper = document.getElementById('editPostModalWrapper');
        const closeEditPostBtn = document.getElementById('closeEditPostBtn');
        const editPostContent = document.getElementById('editPostContent');
        const saveEditPostBtn = document.getElementById('saveEditPostBtn');

        async function init() {
            if (!currentUser) { window.location.href = 'poSter.html'; return; }
            if (!isOwnProfile) { myProfileLink.classList.remove('active'); }
            await loadProfileData();
            await loadAllPosts();
            await loadSuggestedUsers();
            if (!isOwnProfile) { await checkFollowStatus(); }
        }

        async function loadProfileData() {
            profileContent.innerHTML = `<div class="loading"><div class="spinner"></div><p>Loading profile...</p></div>`;
            try {
                const response = await fetch('/api/profile/get?username=' + encodeURIComponent(targetUser));
                const data = await response.json();
                if (response.ok && data.success && data.profile) {
                    userProfile = data.profile;
                    renderProfileHeader();
                } else {
                    showNotification('Failed to load profile data.', 'error');
                    profileContent.innerHTML = '<div class="empty-state">User not found.</div>';
                }
            } catch (error) {
                console.error('Error loading profile:', error);
                showNotification('Error loading profile.', 'error');
            }
        }

        function renderProfileHeader() {
            if (userProfile.avatar) {
                profileAvatar.innerHTML = `<img src="${userProfile.avatar}" alt="Avatar">`;
            } else {
                profileAvatar.textContent = getInitials(userProfile.name);
            }
            profileName.textContent = userProfile.name || 'Unknown Name';
            profileHandle.textContent = '@' + (userProfile.handle || 'unknown');
            profileBio.textContent = userProfile.bio || 'No bio available.';
            profileBirthday.textContent = '🎂 Birthday: ' + (userProfile.birthday || 'Unknown');
            profileHobbies.textContent = '🎨 Hobbies: ' + (Array.isArray(userProfile.hobbies) ? userProfile.hobbies.join(', ') : 'None');
            followersCount.textContent = userProfile.followersCount || 0;
            followingCount.textContent = userProfile.followingList ? userProfile.followingList.length : 0;

            if (isOwnProfile) {
                editProfileBtn.style.display = 'flex';
                profileFollowBtn.style.display = 'none';
            } else {
                editProfileBtn.style.display = 'none';
                profileFollowBtn.style.display = 'block';
            }
        }

        async function checkFollowStatus() {
            try {
                const response = await fetch('/api/profile/get?username=' + encodeURIComponent(currentUser));
                const data = await response.json();
                if (data.success && data.profile) {
                    const myFollowing = data.profile.followingList || [];
                    amIFollowingTarget = myFollowing.includes(userProfile.handle);
                    renderFollowButton();
                }
            } catch (error) { console.error('Error checking follow status', error); }
        }

        function renderFollowButton() {
            if (amIFollowingTarget) {
                profileFollowBtn.textContent = 'Following';
                profileFollowBtn.classList.add('following');
            } else {
                profileFollowBtn.textContent = 'Follow';
                profileFollowBtn.classList.remove('following');
            }
        }

        profileFollowBtn.addEventListener('click', async () => {
            const action = amIFollowingTarget ? 'unfollow' : 'follow';
            await toggleFollow(userProfile.handle, action, profileFollowBtn);
        });

        // ========== 核心修复：使用 username 匹配 ==========
        async function loadAllPosts() {
            try {
                const response = await fetch('/api/feed?sort=recent&username=' + encodeURIComponent(currentUser));
                const data = await response.json();

                if (response.ok && data.success && data.posts) {
                    allPosts = data.posts;
                    
                    // 🔑 关键修复：使用 username（targetUser）匹配，而不是 name
                    const targetUsername = targetUser;
                    
                    // Posts: post.author 存的是 username
                    userPosts = allPosts.filter(post => post.author === targetUsername);
                    
                    // Likes: likedBy 存的是 username
                    userLikedPosts = allPosts.filter(post => {
                        const likedBy = post.likedBy || [];
                        return likedBy.includes(targetUsername);
                    });
                    
                    postsCount.textContent = userPosts.length;
                    renderContent(currentTab === 'posts' ? userPosts : userLikedPosts);
                } else {
                    renderContent([]);
                }
            } catch (error) {
                console.error('Error loading feed:', error);
                renderContent([]);
            }
        }

        function renderContent(posts) {
            if (posts.length === 0) {
                const message = currentTab === 'posts' ? 'No posts yet.' : 'No liked posts yet.';
                profileContent.innerHTML = `<div class="empty-state">${message}</div>`;
                return;
            }
            profileContent.innerHTML = posts.map(post => createPostElement(post)).join('');
            
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', handleActionClick);
            });
            
            if (isOwnProfile && currentTab === 'posts') {
                document.querySelectorAll('.post-control-btn.delete').forEach(btn => {
                    btn.addEventListener('click', handleDeletePost);
                });
                document.querySelectorAll('.post-control-btn.edit').forEach(btn => {
                    btn.addEventListener('click', handleEditPost);
                });
            }
        }

        function showNotification(message, type = 'primary') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            if (type === 'error') { notification.style.background = '#dc3545'; }
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function getInitials(name) {
            return name ? name.split(' ').map(n => n[0]).join('').toUpperCase() : '??';
        }

        function formatTime(timeString) {
            const date = new Date(timeString);
            return date.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function createPostElement(post) {
            const displayName = post.author_username || post.author || 'Unknown';
            const displayHandle = post.author_handle || ('@' + displayName.toLowerCase().replace(/\s/g, ''));
            const displayTime = post.createdAt || new Date().toISOString();
            const isLiked = post.user_liked ? 'liked' : '';
            const likeCount = post.likes || 0;
            const commentCount = post.comments ? post.comments.length : 0;
            
            const avatarHtml = post.author_avatar 
                ? `<img src="${post.author_avatar}" alt="${displayName}">`
                : getInitials(displayName);

            let mediaHtml = '';
            if (post.media && post.media.length > 0) {
                mediaHtml = post.media.map(item => {
                    if (item.type === 'image') {
                        return `<img src="${item.url}" alt="Post image" class="post-media">`;
                    } else if (item.type === 'video') {
                        return `<video src="${item.url}" controls class="post-media"></video>`;
                    }
                    return '';
                }).join('');
            } else if (post.image) {
                mediaHtml = `<img src="${post.image}" alt="Post image" class="post-media">`;
            }

            let controlBtns = '';
            if (isOwnProfile && currentTab === 'posts') {
                controlBtns = `
                    <div class="post-control-btns">
                        <button class="post-control-btn edit" data-post-id="${post.id}" title="Edit post">✏️</button>
                        <button class="post-control-btn delete" data-post-id="${post.id}" title="Delete post">🗑️</button>
                    </div>
                `;
            }

            return `
                <div class="post" data-post-id="${post.id}">
                    <div class="post-header">
                        <div class="post-avatar">${avatarHtml}</div>
                        <div class="post-author-info">
                            <span class="post-author-name">${displayName}</span>
                            <span class="post-author-handle">${displayHandle}</span>
                        </div>
                        <div class="post-time">${formatTime(displayTime)}</div>
                        ${controlBtns}
                    </div>
                    <div class="post-content">${post.content}</div>
                    ${mediaHtml}
                    <div class="post-actions">
                        <button class="action-btn like-btn ${isLiked}" data-post-id="${post.id}">
                            <span>👍</span>
                            <span class="action-count">${likeCount}</span>
                        </button>
                        <button class="action-btn comment-btn" data-post-id="${post.id}">
                            <span>💬</span>
                            <span class="action-count">${commentCount}</span>
                        </button>
                        <button class="action-btn share-btn" data-post-id="${post.id}">
                            <span>🔗</span>
                            <span class="action-count">Share</span>
                        </button>
                    </div>
                </div>
            `;
        }

        // ========== 编辑帖子 ==========
        function handleEditPost(e) {
            const btn = e.currentTarget;
            const postId = parseInt(btn.dataset.postId);
            const post = allPosts.find(p => p.id === postId);
            if (post) {
                editingPostId = postId;
                editPostContent.value = post.content;
                editPostModalWrapper.style.display = 'block';
            }
        }

        saveEditPostBtn.addEventListener('click', async () => {
            const newContent = editPostContent.value.trim();
            if (!newContent) {
                showNotification('Post content cannot be empty.', 'error');
                return;
            }
            try {
                const response = await fetch('/api/post/update', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ postId: editingPostId, username: currentUser, content: newContent })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    showNotification('✅ Post updated successfully.', 'primary');
                    editPostModalWrapper.style.display = 'none';
                    await loadAllPosts();
                } else {
                    showNotification(data.message || 'Failed to update post.', 'error');
                }
            } catch (error) {
                console.error('Error updating post:', error);
                showNotification('Network error while updating post.', 'error');
            }
        });

        closeEditPostBtn.addEventListener('click', () => { editPostModalWrapper.style.display = 'none'; });
        editPostModalWrapper.addEventListener('click', (e) => {
            if (e.target === editPostModalWrapper) editPostModalWrapper.style.display = 'none';
        });

        // ========== 删除帖子 ==========
        async function handleDeletePost(e) {
            const btn = e.currentTarget;
            const postId = parseInt(btn.dataset.postId);
            if (!confirm('Are you sure you want to delete this post?')) { return; }
            try {
                const response = await fetch('/api/post/delete', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ postId: postId, username: currentUser })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    showNotification('🗑️ Post deleted successfully.', 'primary');
                    await loadAllPosts();
                } else {
                    showNotification(data.message || 'Failed to delete post.', 'error');
                }
            } catch (error) {
                console.error('Error deleting post:', error);
                showNotification('Network error while deleting post.', 'error');
            }
        }

        async function loadSuggestedUsers() {
            if (!currentUser) return;
            try {
                const response = await fetch('/api/users/suggested?username=' + encodeURIComponent(currentUser));
                const data = await response.json();
                if (response.ok && data.success && data.users && data.users.length > 0) {
                    renderSuggestedUsers(data.users);
                } else {
                    suggestedUsersContainer.innerHTML = '<p style="color: #888; font-size: 13px; text-align: center; padding: 15px;">No suggestions available</p>';
                }
            } catch (error) {
                suggestedUsersContainer.innerHTML = '<p style="color: #888; font-size: 13px; text-align: center; padding: 15px;">Unable to load suggestions</p>';
            }
        }

        function renderSuggestedUsers(users) {
            suggestedUsersContainer.innerHTML = users.map(user => {
                const avatarHtml = user.avatar ? `<img src="${user.avatar}" alt="${user.name}">` : getInitials(user.name);
                const profileLink = `poSter_profile.html?username=${encodeURIComponent(user.username)}`;
                return `
                <div class="suggested-user">
                    <div class="suggested-avatar" onclick="window.location.href='${profileLink}'" style="cursor:pointer">${avatarHtml}</div>
                    <div class="suggested-info">
                        <a href="${profileLink}" class="suggested-name" style="text-decoration:none; cursor:pointer">${user.name}</a>
                        <span class="suggested-handle">@${user.handle}</span>
                    </div>
                    <button class="btn btn-primary follow-action-btn" onclick="toggleFollow('${user.handle}', 'follow', this)" data-handle="${user.handle}" data-action="follow">Follow</button>
                </div>
            `}).join('');
        }

        async function toggleFollow(handle, action, btnElement = null) {
            const endpoint = action === 'follow' ? '/api/user/follow' : '/api/user/unfollow';
            const body = action === 'follow' 
                ? { username: currentUser, follow_handle: handle }
                : { username: currentUser, unfollow_handle: handle };
            if (btnElement) btnElement.disabled = true;
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    showNotification(`✅ ${action === 'follow' ? 'Followed' : 'Unfollowed'} @${handle}`, 'primary');
                    if (isOwnProfile) {
                        let currentCount = parseInt(followingCount.textContent) || 0;
                        followingCount.textContent = action === 'follow' ? currentCount + 1 : Math.max(0, currentCount - 1);
                    } else {
                        if (handle === userProfile.handle) {
                            let currentCount = parseInt(followersCount.textContent) || 0;
                            followersCount.textContent = action === 'follow' ? currentCount + 1 : Math.max(0, currentCount - 1);
                            amIFollowingTarget = (action === 'follow');
                            renderFollowButton();
                        }
                    }
                    if (btnElement && btnElement !== profileFollowBtn) {
                        if (action === 'follow') {
                            btnElement.textContent = 'Following';
                            btnElement.classList.add('following');
                            btnElement.onclick = () => toggleFollow(handle, 'unfollow', btnElement);
                        } else {
                            btnElement.textContent = 'Follow';
                            btnElement.classList.remove('following');
                            btnElement.onclick = () => toggleFollow(handle, 'follow', btnElement);
                        }
                    }
                    if (userListModalWrapper.style.display === 'block') {
                        await showUserListModal(currentListType);
                    }
                } else {
                    showNotification(data.message || `Error ${action}ing`, 'error');
                }
            } catch (error) {
                console.error(error);
                showNotification('Network error', 'error');
            } finally {
                if (btnElement) btnElement.disabled = false;
            }
        }

        async function handleActionClick(e) {
            const btn = e.currentTarget;
            const postId = parseInt(btn.dataset.postId);
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;
            if (btn.classList.contains('like-btn')) {
                await toggleLike(postId, btn, post);
            } else if (btn.classList.contains('comment-btn')) {
                showCommentsModal(postId, post);
            } else if (btn.classList.contains('share-btn')) {
                sharePost(postId, post);
            }
        }

        async function toggleLike(postId, btn, post) {
            const isLiked = btn.classList.contains('liked');
            const action = isLiked ? 'unlike' : 'like';
            try {
                const response = await fetch(`/api/feed/${postId}/react`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser, action: action })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    const newPost = data.post;
                    if (newPost.user_liked) btn.classList.add('liked');
                    else btn.classList.remove('liked');
                    btn.querySelector('.action-count').textContent = newPost.likes;
                    Object.assign(post, newPost);
                    await loadAllPosts();
                }
            } catch (error) { console.error(error); }
        }

        function showCommentsModal(postId, post) {
            const comments = post.comments || [];
            let commentsHTML = '';
            if (comments.length > 0) {
                commentsHTML = comments.map(comment => {
                    // 🔑 关键修改：使用 comment.user_avatar 显示真实头像
                    const avatarHtml = comment.user_avatar ? 
                        `<img src="${comment.user_avatar}" alt="${comment.user_name || comment.username}" style="width:100%;height:100%;object-fit:cover;">` : 
                        getInitials(comment.user_name || comment.username);
                    const displayName = comment.user_name || comment.username;
                    return `
                        <div class="comment-item" style="display: flex; gap: 12px; margin-bottom: 20px;">
                            <div class="comment-avatar" style="width: 36px; height: 36px; border-radius: 50%; background: var(--primary-color); display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; flex-shrink: 0; font-weight: 700; overflow: hidden;">${avatarHtml}</div>
                            <div class="comment-content">
                                <div class="comment-author" style="font-weight: 700; font-size: 13px; margin-bottom: 2px;">${displayName}</div>
                                <div class="comment-text" style="font-size: 14px; line-height: 1.5;">${comment.text}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                commentsHTML = '<p style="text-align: center; color: #888; padding: 20px;">No comments yet.</p>';
            }

            commentsModalBody.innerHTML = `
                <div id="commentsList">${commentsHTML}</div>
                <div class="comment-form" style="display: flex; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #f0f0f0;">
                    <input type="text" class="comment-input" id="commentInput" placeholder="Write a comment..." style="flex-grow: 1; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 20px; font-size: 14px;">
                    <button class="comment-submit btn-primary" id="submitCommentBtn" style="padding: 8px 16px; font-weight: 600; font-size: 13px; border:none; border-radius: 20px; cursor: pointer;">Post</button>
                </div>
            `;
            
            const submitBtn = document.getElementById('submitCommentBtn');
            const input = document.getElementById('commentInput');
            submitBtn.onclick = () => submitComment(postId, post);
            input.onkeypress = (e) => { if (e.key === 'Enter') submitComment(postId, post); };
            
            commentsModalWrapper.style.display = 'block';
        }

        async function submitComment(postId, post) {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if (!text) return;
            const response = await fetch(`/api/feed/${postId}/comment`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser, text: text })
            });
            if (response.ok) {
                const data = await response.json();
                Object.assign(post, data.post);
                showCommentsModal(postId, post);
                showNotification('Comment posted!', 'primary');
            }
        }

        function sharePost(postId, post) {
            const text = `Check out ${post.author}'s post!`;
            if (navigator.share) navigator.share({ title: 'poSter', text: text });
            else alert('Share link copied! (simulated)');
        }

        async function showUserListModal(type) {
            currentListType = type;
            listModalTitle.textContent = type === 'followers' ? 'Followers' : 'Following';
            listModalBody.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
            userListModalWrapper.style.display = 'block';
            try {
                const response = await fetch(`/api/profile/list?type=${type}&username=${encodeURIComponent(targetUser)}`);
                const data = await response.json();
                if (data.success && data.users) {
                    renderUserList(data.users, type);
                } else {
                    renderUserList([], type);
                }
            } catch (error) {
                listModalBody.innerHTML = '<p style="text-align: center;">Error loading list.</p>';
            }
        }

        function renderUserList(users, type) {
            if (users.length === 0) {
                listModalBody.innerHTML = '<p style="text-align: center; padding: 20px;">No users found.</p>';
                return;
            }
            listModalBody.innerHTML = users.map(user => {
                const showUnfollow = isOwnProfile && type === 'following';
                const actionButton = showUnfollow ? 
                    `<button class="btn btn-unfollow" onclick="event.stopPropagation(); toggleFollow('${user.handle}', 'unfollow', this)">Unfollow</button>` : '';
                const avatarHtml = user.avatar ? `<img src="${user.avatar}" alt="${user.name}">` : getInitials(user.name);
                return `
                    <div class="list-item" onclick="window.location.href='poSter_profile.html?username=${encodeURIComponent(user.username)}'">
                        <div class="list-avatar">${avatarHtml}</div>
                        <div class="list-info">
                            <span class="suggested-name">${user.name}</span>
                            <span class="suggested-handle">@${user.handle}</span>
                        </div>
                        ${actionButton}
                    </div>
                `;
            }).join('');
        }

        function closeListModal() { userListModalWrapper.style.display = 'none'; }
        closeListBtn.addEventListener('click', closeListModal);
        userListModalWrapper.addEventListener('click', (e) => { if (e.target === userListModalWrapper) closeListModal(); });
        closeCommentsBtn.addEventListener('click', () => commentsModalWrapper.style.display = 'none');
        commentsModalWrapper.addEventListener('click', (e) => { if (e.target === commentsModalWrapper) commentsModalWrapper.style.display = 'none'; });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentTab = e.target.dataset.tab;
                renderContent(currentTab === 'posts' ? userPosts : userLikedPosts);
            });
        });

        followersItem.addEventListener('click', () => showUserListModal('followers'));
        followingItem.addEventListener('click', () => showUserListModal('following'));

        // Edit Profile Logic
        if (isOwnProfile) {
            editProfileBtn.addEventListener('click', () => {
                document.getElementById('editName').value = userProfile.name || '';
                document.getElementById('editBio').value = userProfile.bio || '';
                document.getElementById('editBirthday').value = userProfile.birthday !== 'Unknown' ? userProfile.birthday : '';
                document.getElementById('editHobbies').value = Array.isArray(userProfile.hobbies) ? userProfile.hobbies.join(', ') : (userProfile.hobbies || '');
                editAvatarInput.value = '';
                if (userProfile.avatar) {
                    editAvatarPreview.innerHTML = `<img src="${userProfile.avatar}">`;
                } else {
                    editAvatarPreview.innerHTML = `<span>👤</span>`;
                }
                editProfileModalWrapper.style.display = 'block';
            });

            editAvatarInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => editAvatarPreview.innerHTML = `<img src="${e.target.result}">`;
                    reader.readAsDataURL(file);
                }
            });

            editProfileForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData();
                formData.append('username', currentUser);
                formData.append('name', document.getElementById('editName').value);
                formData.append('bio', document.getElementById('editBio').value);
                formData.append('birthday', document.getElementById('editBirthday').value);
                formData.append('hobbies', document.getElementById('editHobbies').value);
                if (editAvatarInput.files[0]) formData.append('avatar', editAvatarInput.files[0]);
                const res = await fetch('/api/profile/update', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    userProfile = data.profile;
                    renderProfileHeader();
                    await loadAllPosts();
                    editProfileModalWrapper.style.display = 'none';
                    showNotification('Profile updated successfully!');
                }
            });

            closeEditProfileBtn.addEventListener('click', () => editProfileModalWrapper.style.display = 'none');
            editProfileModalWrapper.addEventListener('click', (e) => {
                if (e.target === editProfileModalWrapper) editProfileModalWrapper.style.display = 'none';
            });

            deleteAccountBtn.addEventListener('click', async () => {
                if (confirm('Are you sure you want to delete your account?')) {
                    const res = await fetch('/api/user/delete', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: currentUser })
                    });
                    if (res.ok) {
                        localStorage.removeItem('currentUser');
                        window.location.href = 'poSter.html';
                    }
                }
            });
        }

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'poSter.html';
        });

        window.addEventListener('load', init);
    </script>
</body>
</html>
